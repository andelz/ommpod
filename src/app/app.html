
  @if (updateService.updateAvailable()) {
    <div class="update-banner" role="alert">
      <span>{{ 'home.update.message' | translate }}</span>
      <button class="update-btn" (click)="updateService.reload()">{{ 'home.update.reload' | translate }}</button>
    </div>
  }

  @if (!isNowPlaying()) {

    <header>
      <a routerLink="/home" class="brand">P<em>O</em>D</a>
    </header>


    <nav>

        <a class="nav-btn" routerLink="/home" routerLinkActive="active">
          <lucide-icon [size]="18" [img]="icons.home"></lucide-icon>
        </a>
        <a class="nav-btn" routerLink="/library" routerLinkActive="active">
          <lucide-icon [size]="18" [img]="icons.lib"></lucide-icon>

        </a>
        <a class="nav-btn" routerLink="/downloads" routerLinkActive="active">
          <lucide-icon [size]="18" [img]="icons.download"></lucide-icon>
        </a>
        <a class="nav-btn" routerLink="/search" routerLinkActive="active">
          <lucide-icon [size]="18" [img]="icons.search"></lucide-icon>
        </a>
        <a class="nav-btn" routerLink="/settings" routerLinkActive="active">
          <lucide-icon [size]="18" [img]="icons.settings"></lucide-icon>
        </a>

    </nav>
  }

  <main class="main">
    <router-outlet />
  </main>

  @if (!isNowPlaying()) {
    <app-player-bar />
  }
