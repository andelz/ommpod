<div class="shell">
  @if (nowPlayingOpen()) {
    <app-now-playing (close)="closeNowPlaying()" />
  } @else {
    <nav class="nav">
      <span class="nav-brand">POD</span>
      <button class="nav-btn" [class.active]="activeView() === 'library'" (click)="setView('library')">[lib]</button>
      <button class="nav-btn" [class.active]="activeView() === 'downloads'" (click)="setView('downloads')">[dl]</button>
      <button class="nav-btn" [class.active]="activeView() === 'search'" (click)="setView('search')">[search]</button>
    </nav>

    <main class="main">
      @if (selectedPodcast()) {
        <app-episode-list [podcast]="selectedPodcast()!" (back)="closePodcast()" />
      } @else if (activeView() === 'search') {
        <app-search (podcastSelected)="openPodcast($event)" />
      } @else if (activeView() === 'downloads') {
        <app-downloads />
      } @else {
        <app-library (podcastSelected)="openPodcast($event)" />
      }
    </main>

    <app-player-bar (openNowPlaying)="openNowPlaying()" />
  }
</div>
