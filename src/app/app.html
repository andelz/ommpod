<div class="shell">
  @if (!isNowPlaying()) {
    <nav class="nav">
      <span class="nav-brand">POD</span>
      <a class="nav-btn" routerLink="/library" routerLinkActive="active">[lib]</a>
      <a class="nav-btn" routerLink="/downloads" routerLinkActive="active">[dl]</a>
      <a class="nav-btn" routerLink="/search" routerLinkActive="active">[search]</a>
    </nav>
  }

  <main class="main">
    <router-outlet />
  </main>

  @if (!isNowPlaying()) {
    <app-player-bar />
  }
</div>
