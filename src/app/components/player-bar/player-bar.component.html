@if (player.episode()) {
  <div class="player-bar">
    
    <!-- progress track -->
    <div class="progress-track" (click)="onProgressClick($event)" role="slider"
      [attr.aria-valuenow]="player.currentTime()" [attr.aria-valuemax]="player.duration()"
      [attr.aria-label]="'player.seek' | translate">
      <div class="progress-fill" [style.width.%]="progressPct"></div>
    </div>

    <!-- controls -->
    <div class="controls">

      <button class="ep-info" (click)="openNowPlaying()" [title]="'player.open-now-playing' | translate">
        @if (player.loading()) {
          <span class="status-dot">...</span>
        }
        <span class="ep-title">{{ player.episode()!.title }}</span>
        <span class="ep-pod dim">{{ player.episode()!.podcastTitle }}</span>
      </button>

      <div class="btns">
        <button (click)="skip(-15)" [title]="'player.skip-back' | translate: { s: 15 }">-15</button>
        <button class="play-btn" (click)="player.togglePlay()" [attr.aria-label]="player.isPlaying() ? ('player.pause' | translate) : ('player.play' | translate)">
          {{ player.isPlaying() ? '[||]' : '[>]' }}
        </button>
        <button (click)="skip(30)" [title]="'player.skip-fwd' | translate: { s: 30 }">+30</button>
        <button class="rate-btn" (click)="cycleRate()" [title]="'player.playback-rate' | translate">{{ player.playbackRate() }}x</button>
        <span class="time dim">{{ player.currentTime() | duration }} / {{ player.duration() | duration }}</span>
        <button class="stop-btn" (click)="player.stop()" [title]="'player.stop' | translate">✕</button>
      </div>
    </div>
  </div>
}
